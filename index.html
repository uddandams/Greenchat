<!DOCTYPE html>
<html>
<head>
  <title>GreenChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:sans-serif;background:#ece5dd;}

#chat{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

#users{
  display:flex;
  overflow-x:auto;
  background:#111;
  padding:10px;
}

.user{
  position:relative;
  margin-right:10px;
  cursor:pointer;
}

.user img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #25d366;
}

.online{
  position:absolute;
  bottom:5px;
  right:5px;
  width:10px;
  height:10px;
  background:#25d366;
  border-radius:50%;
  border:2px solid #111;
}

#header{
  background:#075e54;
  color:white;
  padding:10px;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{display:flex;margin:6px 0;}
.me{justify-content:flex-end;}
.other{justify-content:flex-start;}

.bubble{
  position:relative;
  padding:10px;
  padding-bottom:22px;
  border-radius:12px;
  max-width:70%;
  word-wrap:break-word;
}

.me .bubble{background:#25d366;color:white;}
.other .bubble{background:white;}

.text{
  display:block;
  padding-right:65px;
}

.time{
  position:absolute;
  bottom:5px;
  right:8px;
  font-size:10px;
  opacity:0.6;
}

#inputArea{
  display:flex;
  padding:8px;
  background:#eee;
  position:sticky;
  bottom:0;
}

textarea{
  flex:1;
  border:none;
  border-radius:20px;
  padding:10px;
  font-size:16px;
}

button{
  background:#25d366;
  border:none;
  color:white;
  padding:10px;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="chat">

<div id="users"></div>

<div id="header">My Notes</div>

<div id="messages"></div>

<div id="inputArea">
  <textarea id="msg"></textarea>
  <button onclick="send()">➤</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, onChildAdded, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyC-951OTqzrB7kVIqUFd2LFnL3kOrFl3NU",
  authDomain:"greenmsg-327b6.firebaseapp.com",
  projectId:"greenmsg-327b6"
});

const db=getDatabase(app);
const auth=getAuth(app);

let uid="", myPhoto="", usersData={}, selectedUser="notes";
let unsubscribe = null;

/* LOGIN */
onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;
    myPhoto=user.photoURL || "https://via.placeholder.com/50";

    set(ref(db,"users/"+uid),{
      name:user.displayName || "User",
      photo:myPhoto,
      online:true
    });

    onDisconnect(ref(db,"users/"+uid+"/online")).set(false);

    init();
  }
});

/* INIT */
function init(){
  loadUsers();
  loadMessages();
  Notification.requestPermission();
}

/* USERS */
function loadUsers(){
  onValue(ref(db,"users"),snap=>{
    users.innerHTML="";
    usersData={};

    const me=document.createElement("div");
    me.className="user";
    me.innerHTML=`<img src="${myPhoto}"><div class="online"></div>`;
    me.onclick=()=>{
      selectedUser="notes";
      header.innerText="My Notes";
      loadMessages();
    };
    users.appendChild(me);

    snap.forEach(c=>{
      const u=c.val();
      const id=c.key;

      usersData[id]=u;
      if(id===uid) return;

      const div=document.createElement("div");
      div.className="user";

      div.innerHTML=`
        <img src="${u.photo}">
        ${u.online ? '<div class="online"></div>' : ''}
      `;

      div.onclick=()=>{
        selectedUser=id;
        header.innerText=u.name;
        loadMessages();
      };

      users.appendChild(div);
    });
  });
}

/* CHAT ID */
function chatId(a,b){
  if(b==="notes") return "notes_"+a;
  return [a,b].sort().join("_");
}

/* SEND */
window.send=()=>{
  const text=msg.value.trim();
  if(!text) return;

  const now = new Date();

  push(ref(db,"chats/"+chatId(uid,selectedUser)),{
    text,
    sender:uid,
    time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
    day: now.toLocaleDateString('en-US',{weekday:'short'}),
    date: now.toLocaleDateString('en-GB',{day:'2-digit', month:'short'})
  });

  msg.value="";
};

/* 🔥 FINAL NO-FLICKER MESSAGE LOAD */
function loadMessages(){

  messages.innerHTML = "";

  const chatRef = ref(db,"chats/"+chatId(uid,selectedUser));

  if(unsubscribe){
    unsubscribe();
    unsubscribe = null;
  }

  let firstLoad = true;

  unsubscribe = onChildAdded(chatRef, snap=>{
    const m = snap.val();

    if(m.sender !== uid && document.hidden){
      new Notification("New Message", { body: m.text });
    }

    const div = document.createElement("div");
    div.className = "msg " + (m.sender===uid ? "me":"other");

    div.innerHTML = `
      <div class="bubble">
        <div class="text">${m.text}</div>
        <div class="time">
          ${m.date || ""}, ${m.day || ""} ${m.time || ""}
        </div>
      </div>
    `;

    messages.appendChild(div);

    if(!firstLoad){
      messages.scrollTop = messages.scrollHeight;
    }
  });

  setTimeout(()=>{
    firstLoad = false;
    messages.scrollTop = messages.scrollHeight;
  },300);
}

</script>

</body>
</html>
